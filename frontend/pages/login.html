<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | MangaReader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 60% at 30% 30%, rgba(124,58,237,0.1) 0%, transparent 65%),
                radial-gradient(ellipse 50% 50% at 80% 80%, rgba(230,57,70,0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 44px;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .auth-logo h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 0.08em;
            color: var(--text);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .auth-logo h1 i {
            color: var(--crimson);
        }

        .auth-logo p {
            color: var(--muted);
            font-size: 0.95rem;
            margin-top: 6px;
        }

        .auth-tabs {
            display: flex;
            background: var(--surface-2);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 28px;
            gap: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .auth-tab.active {
            background: var(--crimson);
            color: white;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.03em;
        }

        .form-group input {
            padding: 12px 16px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.97rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus {
            border-color: var(--indigo);
        }

        .form-group input::placeholder {
            color: var(--muted-2);
        }

        .forgot-link {
            text-align: right;
            margin-top: -8px;
        }

        .forgot-link a {
            color: var(--muted);
            font-size: 0.85rem;
            transition: color 0.2s ease;
        }

        .forgot-link a:hover {
            color: var(--indigo);
        }

        .btn-auth {
            padding: 14px;
            background: var(--crimson);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 4px;
        }

        .btn-auth:hover {
            background: var(--crimson-2);
            transform: translateY(-1px);
        }

        .auth-divider {
            text-align: center;
            position: relative;
            margin: 4px 0;
        }

        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border);
        }

        .auth-divider span {
            background: var(--surface);
            padding: 0 14px;
            color: var(--muted);
            font-size: 0.85rem;
            position: relative;
        }

        .btn-social {
            padding: 12px 16px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-social:hover {
            border-color: rgba(255,255,255,0.2);
            color: var(--text);
        }

        .btn-social i.fa-google { color: #ea4335; }
        .btn-social i.fa-discord { color: #5865f2; }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .auth-footer a {
            color: var(--indigo);
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .auth-footer a:hover {
            color: #9d6cff;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <h1><i class="fas fa-book-open"></i> MangaReader</h1>
                <p>Bem-vindo de volta</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Entrar</button>
                <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Criar conta</button>
            </div>

            <form class="auth-form" id="login-form" onsubmit="handleAuth(event, 'login')" novalidate>
                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    <input id="login-email" type="email" placeholder="seu@email.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <div class="forgot-link">
                    <a href="#">Esqueci minha senha</a>
                </div>
                <button type="submit" class="btn-auth" id="login-submit">Entrar</button>
                <div class="auth-divider"><span>ou</span></div>
                <a href="#" class="btn-social"><i class="fab fa-google"></i> Continuar com Google</a>
                <a href="#" class="btn-social"><i class="fab fa-discord"></i> Continuar com Discord</a>
            </form>

            <form class="auth-form" id="register-form" style="display:none" onsubmit="handleAuth(event, 'register')" novalidate>
                <div class="form-group">
                    <label for="reg-name">Nome</label>
                    <input id="reg-name" type="text" placeholder="Seu nome" autocomplete="name" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">E-mail</label>
                    <input id="reg-email" type="email" placeholder="seu@email.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Senha</label>
                    <input id="reg-password" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" minlength="8" required>
                </div>
                <button type="submit" class="btn-auth" id="register-submit">Criar conta grátis</button>
                <div class="auth-divider"><span>ou</span></div>
                <a href="#" class="btn-social"><i class="fab fa-google"></i> Continuar com Google</a>
            </form>

            <p class="auth-footer">
                Ao continuar, você concorda com nossos <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a>.
            </p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('register') === 'true') switchTab('register');

        function switchTab(tab) {
            document.getElementById('login-form').style.display = tab === 'login' ? 'flex' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'flex' : 'none';
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            clearFieldErrors();
        }

        function isValidEmail(v) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v.trim());
        }

        function showFieldError(input, msg) {
            clearFieldError(input);
            const err = document.createElement('span');
            err.className = 'field-error';
            err.textContent = msg;
            err.style.cssText = 'color:#e63946;font-size:0.8rem;margin-top:2px;display:block;';
            input.parentNode.appendChild(err);
            input.style.borderColor = '#e63946';
        }

        function clearFieldError(input) {
            const existing = input.parentNode.querySelector('.field-error');
            if (existing) existing.remove();
            input.style.borderColor = '';
        }

        function clearFieldErrors() {
            document.querySelectorAll('.field-error').forEach(e => e.remove());
            document.querySelectorAll('input').forEach(i => i.style.borderColor = '');
        }

        function setSubmitting(btn, loading) {
            btn.disabled = loading;
            btn.textContent = loading ? 'Aguarde...' : btn.dataset.label || btn.textContent;
        }

        document.querySelectorAll('.btn-auth').forEach(btn => {
            btn.dataset.label = btn.textContent;
        });

        function handleAuth(e, type) {
            e.preventDefault();
            clearFieldErrors();

            if (type === 'login') {
                const email = document.getElementById('login-email');
                const pass = document.getElementById('login-password');
                let valid = true;
                if (!isValidEmail(email.value)) { showFieldError(email, 'E-mail inválido.'); valid = false; }
                if (pass.value.length < 1) { showFieldError(pass, 'Senha obrigatória.'); valid = false; }
                if (!valid) return;

                const btn = document.getElementById('login-submit');
                setSubmitting(btn, true);
                setTimeout(() => { window.location.href = '/'; }, 800);

            } else {
                const name = document.getElementById('reg-name');
                const email = document.getElementById('reg-email');
                const pass = document.getElementById('reg-password');
                let valid = true;
                if (name.value.trim().length < 2) { showFieldError(name, 'Nome muito curto.'); valid = false; }
                if (!isValidEmail(email.value)) { showFieldError(email, 'E-mail inválido.'); valid = false; }
                if (pass.value.length < 8) { showFieldError(pass, 'Mínimo 8 caracteres.'); valid = false; }
                if (!valid) return;

                const btn = document.getElementById('register-submit');
                setSubmitting(btn, true);
                setTimeout(() => { window.location.href = '/'; }, 800);
            }
        }
    </script>
</body>
</html>
